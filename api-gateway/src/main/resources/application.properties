spring.application.name=api-gateway
server.port=${PORT:8080}

spring.cloud.gateway.discovery.locator.enabled=false

eureka.client.enabled=false

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=https://pawpal-microservices.onrender.com
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=ai-service
spring.cloud.gateway.routes[1].uri=https://pawpal-ai-analytics.onrender.com
spring.cloud.gateway.routes[1].predicates[0]=Path=/ai-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1


spring.cloud.gateway.routes[2].id=pet-management
spring.cloud.gateway.routes[2].uri=https://pawpal-pet-service.onrender.com
spring.cloud.gateway.routes[2].predicates[0]=Path=/pet-management/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1
